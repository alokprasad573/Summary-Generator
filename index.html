<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Summarizer</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-6">
  <div class="bg-white/90 backdrop-blur-md shadow-2xl rounded-2xl w-full max-w-3xl p-10">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-pink-600">
        Text Summarizer
      </h1>
      <p class="text-gray-600 mt-4">Paste your content below and get a concise summary — styled like a friendly conversation.</p>
    </div>

    <!-- Input Area -->
    <form id="summarization-form" class="space-y-6">
      <label for="dialogue" class="block text-gray-800 font-semibold">Your Content</label>
      <textarea id="dialogue"
        class="w-full h-48 p-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-4 focus:ring-pink-400 resize-none shadow-sm"
        placeholder="Enter your content here..." required></textarea>

      <button type="submit" id="summarize-btn"
        class="w-full bg-gradient-to-r from-indigo-600 to-pink-600 text-white font-bold py-3 rounded-xl shadow-lg hover:from-indigo-700 hover:to-pink-700 transition duration-300">
        Summarize 🚀
      </button>
    </form>

    <!-- Output Area -->
    <div class="summary-output mt-10">
      <h3 id="summary-heading"
        class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-indigo-600 mb-4">
        Content Summary
      </h3>
      <div class="bg-gradient-to-r from-gray-50 to-gray-100 border border-gray-200 rounded-xl p-6 shadow-inner">
        <p id="summary-text" class="text-gray-700 italic">Your summary will appear here...</p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
